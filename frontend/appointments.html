<!DOCTYPE html>
<html>
<head>
  <title>Appointments - Hospital DBMS</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<h1>Manage Appointments</h1>

<div class="nav">
  <a href="index.html">Home</a>
  <a href="patients.html">Patients</a>
  <a href="doctors.html">Doctors</a>
  <a href="appointments.html" style="background-color: var(--accent); color: white;">Appointments</a>
</div>

<div class="container">
  <div class="card">
    <h2>Appointment Form</h2>
    <input type="hidden" id="aid">
    <select id="apatient">
      <option value="">Select Patient</option>
    </select>
    <select id="adoctor">
      <option value="">Select Doctor</option>
    </select>
    <input id="adate" type="date">
    <button id="a-submit-btn" onclick="saveAppointment()">Add Appointment</button>
  </div>

  <div class="card">
    <h2>Appointment List</h2>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Patient Name</th>
          <th>Doctor Name</th>
          <th>Date</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="appointments-body">
      </tbody>
    </table>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
