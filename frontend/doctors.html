<!DOCTYPE html>
<html>
<head>
  <title>Doctors - Hospital DBMS</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<h1>Manage Doctors</h1>

<div class="nav">
  <a href="index.html">Home</a>
  <a href="patients.html">Patients</a>
  <a href="doctors.html" style="background-color: var(--accent); color: white;">Doctors</a>
  <a href="appointments.html">Appointments</a>
</div>

<div class="container">
  <div class="card">
    <h2>Doctor Form</h2>
    <input type="hidden" id="did">
    <input id="dname" placeholder="Doctor Name">
    <input id="dspec" list="specialties" placeholder="Type or Select Specialization">
    <datalist id="specialties">
      <option value="Cardiologist">
      <option value="Dermatologist">
      <option value="Neurologist">
      <option value="Radiologist">
      <option value="Pediatrician">
      <option value="Psychiatrist">
      <option value="Orthopedic">
      <option value="General Physician">
    </datalist>
    <button id="d-submit-btn" onclick="saveDoctor()">Add Doctor</button>
  </div>

  <div class="card">
    <h2>Doctor List</h2>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Specialization</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="doctors-body">
      </tbody>
    </table>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
